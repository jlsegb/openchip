version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: openchip
      POSTGRES_USER: openchip
      POSTGRES_PASSWORD: openchip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openchip -d openchip"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 1g

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    mem_limit: 512m

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8080/api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"

  adminer:
    image: adminer:4
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"

volumes:
  postgres_data:
